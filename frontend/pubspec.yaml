name: buildvox
description: Construction job-site communication app — voice memos to action items.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ─────────────────────────────────────────────────────────────────
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.3.0
  firebase_storage: ^12.2.0
  firebase_messaging: ^15.0.4
  cloud_functions: ^5.0.4

  # ── State & Navigation ────────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  go_router: ^14.1.4

  # ── Audio ─────────────────────────────────────────────────────────────────────
  record: ^5.1.2
  file_picker: ^8.1.2

  # ── Utilities ─────────────────────────────────────────────────────────────────
  intl: ^0.19.0
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  uuid: ^4.4.2
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
